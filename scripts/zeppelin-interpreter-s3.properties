# Параметры для интерпретатора Zeppelin (spark / spark.pyspark).
# В Zeppelin: Interpreter → spark → Edit → добавить свойства Property / Value.
# Значения ACCESS_KEY_ID и SECRET_KEY взять из scripts/s3-credentials.env (не коммитить их в репо).

master = local[*]
spark.app.name = Zeppelin
spark.hadoop.fs.s3a.endpoint = https://storage.yandexcloud.net
spark.hadoop.fs.s3a.path.style.access = true
spark.hadoop.fs.s3a.access.key = <ACCESS_KEY_ID>
spark.hadoop.fs.s3a.secret.key = <SECRET_KEY>
spark.hadoop.fs.s3a.impl = org.apache.hadoop.fs.s3a.S3AFileSystem
